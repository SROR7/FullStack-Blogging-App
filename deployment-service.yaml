apiVersion: apps/v1
kind: Deployment
metadata:
  name: bloggingapp-deployment
  namespace: webapps
  labels:
    app: bloggingapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bloggingapp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bloggingapp
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: bloggingapp
          image: sror/blogging-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          env:
            - name: SPRING_PROFILES_ACTIVE    # adjust/remove to your stack
              value: "prod"
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: bloggingapp-svc
  namespace: webapps
  labels:
    app: bloggingapp
spec:
  type: LoadBalancer
  selector:
    app: bloggingapp
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080